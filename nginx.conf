user  www www;
worker_processes auto;
error_log  /usr/local/openresty/nginx/logs/nginx_error.log  crit;
pid        /usr/local/openresty/nginx/logs/nginx.pid;
worker_rlimit_nofile 51200;

events
    {
        use epoll;
        worker_connections 51200;
        multi_accept on;
    }

http
    {
        types {
            text/html                                        html htm shtml;
            text/css                                         css;
            text/xml                                         xml;
            image/gif                                        gif;
            image/jpeg                                       jpeg jpg;
            application/javascript                           js;
            application/atom+xml                             atom;
            application/rss+xml                              rss;

            text/mathml                                      mml;
            text/plain                                       txt;
            text/vnd.sun.j2me.app-descriptor                 jad;
            text/vnd.wap.wml                                 wml;
            text/x-component                                 htc;

            image/png                                        png;
            image/svg+xml                                    svg svgz;
            image/tiff                                       tif tiff;
            image/vnd.wap.wbmp                               wbmp;
            image/webp                                       webp;
            image/x-icon                                     ico;
            image/x-jng                                      jng;
            image/x-ms-bmp                                   bmp;

            font/woff                                        woff;
            font/woff2                                       woff2;

            application/java-archive                         jar war ear;
            application/json                                 json;
            application/mac-binhex40                         hqx;
            application/msword                               doc;
            application/pdf                                  pdf;
            application/postscript                           ps eps ai;
            application/rtf                                  rtf;
            application/vnd.apple.mpegurl                    m3u8;
            application/vnd.google-earth.kml+xml             kml;
            application/vnd.google-earth.kmz                 kmz;
            application/vnd.ms-excel                         xls;
            application/vnd.ms-fontobject                    eot;
            application/vnd.ms-powerpoint                    ppt;
            application/vnd.oasis.opendocument.graphics      odg;
            application/vnd.oasis.opendocument.presentation  odp;
            application/vnd.oasis.opendocument.spreadsheet   ods;
            application/vnd.oasis.opendocument.text          odt;
            application/vnd.openxmlformats-officedocument.presentationml.presentation
                                                            pptx;
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
                                                            xlsx;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document
                                                            docx;
            application/vnd.wap.wmlc                         wmlc;
            application/x-7z-compressed                      7z;
            application/x-cocoa                              cco;
            application/x-java-archive-diff                  jardiff;
            application/x-java-jnlp-file                     jnlp;
            application/x-makeself                           run;
            application/x-perl                               pl pm;
            application/x-pilot                              prc pdb;
            application/x-rar-compressed                     rar;
            application/x-redhat-package-manager             rpm;
            application/x-sea                                sea;
            application/x-shockwave-flash                    swf;
            application/x-stuffit                            sit;
            application/x-tcl                                tcl tk;
            application/x-x509-ca-cert                       der pem crt;
            application/x-xpinstall                          xpi;
            application/xhtml+xml                            xhtml;
            application/xspf+xml                             xspf;
            application/zip                                  zip;

            application/octet-stream                         bin exe dll;
            application/octet-stream                         deb;
            application/octet-stream                         dmg;
            application/octet-stream                         iso img;
            application/octet-stream                         msi msp msm;

            audio/midi                                       mid midi kar;
            audio/mpeg                                       mp3;
            audio/ogg                                        ogg;
            audio/x-m4a                                      m4a;
            audio/x-realaudio                                ra;

            video/3gpp                                       3gpp 3gp;
            video/mp2t                                       ts;
            video/mp4                                        mp4;
            video/mpeg                                       mpeg mpg;
            video/quicktime                                  mov;
            video/webm                                       webm;
            video/x-flv                                      flv;
            video/x-m4v                                      m4v;
            video/x-mng                                      mng;
            video/x-ms-asf                                   asx asf;
            video/x-ms-wmv                                   wmv;
            video/x-msvideo                                  avi;
}

		#include luawaf.conf;

        default_type  application/octet-stream;

        server_names_hash_bucket_size 512;
        client_header_buffer_size 32k;
        large_client_header_buffers 4 32k;
        client_max_body_size 50m;

        sendfile   on;
        tcp_nopush on;

        keepalive_timeout 60;

        tcp_nodelay on;

        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 4 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;
		fastcgi_intercept_errors on;

        gzip on;
        gzip_min_length  1k;
        gzip_buffers     4 16k;
        gzip_http_version 1.1;
        gzip_comp_level 2;
        gzip_types     text/plain application/javascript application/x-javascript text/javascript text/css application/xml;
        gzip_vary on;
        gzip_proxied   expired no-cache no-store private auth;
        gzip_disable   "MSIE [1-6]\.";

        limit_conn_zone $binary_remote_addr zone=perip:10m;
		limit_conn_zone $server_name zone=perserver:10m;

        server_tokens off;
        access_log off;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }
        upstream laravels {
            # By IP:Port
            server 127.0.0.1:5200 weight=5 max_fails=3 fail_timeout=30s;
            # By UnixSocket Stream file
            #server unix:/xxxpath/laravel-s-test/storage/laravels.sock weight=5 max_fails=3 fail_timeout=30s;
            #server 192.168.1.1:5200 weight=3 max_fails=3 fail_timeout=30s;
            #server 192.168.1.2:5200 backup;
        }

    server
    {
        listen 80;
        index index.php index.html index.htm default.php default.htm default.html;
        root /data/public;
        #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
        #error_page 404/404.html;
        #SSL-END

        #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
        #error_page 404 /404.html;
        #error_page 502 /502.html;
        #ERROR-PAGE-END

        #PHP-INFO-START  PHP引用配置，可以注释或修改
        #include enable-php-80.conf;
                location ~ [^/]\.php(/|$)
            {
                try_files $uri =404;
                fastcgi_pass  unix:/tmp/php-cgi-80.sock;
                fastcgi_index index.php;

                fastcgi_param  SCRIPT_FILENAME    $document_root$fastcgi_script_name;
                fastcgi_param  QUERY_STRING       $query_string;
                fastcgi_param  REQUEST_METHOD     $request_method;
                fastcgi_param  CONTENT_TYPE       $content_type;
                fastcgi_param  CONTENT_LENGTH     $content_length;

                fastcgi_param  SCRIPT_NAME        $fastcgi_script_name;
                fastcgi_param  REQUEST_URI        $request_uri;
                fastcgi_param  DOCUMENT_URI       $document_uri;
                fastcgi_param  DOCUMENT_ROOT      $document_root;
                fastcgi_param  SERVER_PROTOCOL    $server_protocol;
                fastcgi_param  REQUEST_SCHEME     $scheme;
                fastcgi_param  HTTPS              $https if_not_empty;

                fastcgi_param  GATEWAY_INTERFACE  CGI/1.1;
                fastcgi_param  SERVER_SOFTWARE    nginx/$nginx_version;

                fastcgi_param  REMOTE_ADDR        $remote_addr;
                fastcgi_param  REMOTE_PORT        $remote_port;
                fastcgi_param  SERVER_ADDR        $server_addr;
                fastcgi_param  SERVER_PORT        $server_port;
                fastcgi_param  SERVER_NAME        $server_name;

                # PHP only, required if PHP was built with --enable-force-cgi-redirect
                fastcgi_param  REDIRECT_STATUS    200;
                set $real_script_name $fastcgi_script_name;
                if ($fastcgi_script_name ~ "^(.+?\.php)(/.+)$") {
                        set $real_script_name $1;
                        set $path_info $2;
                }
                fastcgi_param SCRIPT_FILENAME $document_root$real_script_name;
                fastcgi_param SCRIPT_NAME $real_script_name;
                fastcgi_param PATH_INFO $path_info;
            }
        #PHP-INFO-END

        #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
        #include /www/server/panel/vhost/rewrite/wm.y-qb.cn.conf;
        #REWRITE-END

        #禁止访问的文件或目录
        location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)
        {
            return 404;
        }

        #一键申请SSL证书验证目录相关设置
        location ~ \.well-known{
            allow all;
        }

        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
        {
            expires      30d;
            error_log /dev/null;
            access_log /dev/null;
        }

        location ~ .*\.(js|css)?$
        {
            expires      12h;
            error_log /dev/null;
            access_log /dev/null;
        }
        location =/ws {
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
            #proxy_read_timeout：如果60秒内客户端没有发数据到服务端，那么Nginx会关闭连接；同时，Swoole的心跳设置也会影响连接的关闭
            # proxy_read_timeout 60s;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Real-PORT $remote_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header Scheme $scheme;
            proxy_set_header Server-Protocol $server_protocol;
            proxy_set_header Server-Name $server_name;
            proxy_set_header Server-Addr $server_addr;
            proxy_set_header Server-Port $server_port;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://laravels;
        }

        location = /super {
            return 301 /super/;
        }

        location ^~ /super/ {
            try_files $uri $uri/ /super/index.html;
        }

        location = /admin {
            return 301 /admin/;
        }

        location ^~ /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        location = /cashier {
            return 301 /cashier/;
        }

        location ^~ /cashier/ {
            try_files $uri $uri/ /cashier/index.html;
        }

        location @laravels {
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Real-PORT $remote_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header Scheme $scheme;
            proxy_set_header Server-Protocol $server_protocol;
            proxy_set_header Server-Name $server_name;
            proxy_set_header Server-Addr $server_addr;
            proxy_set_header Server-Port $server_port;
            proxy_pass http://laravels;
        }

        # location /install {
        # try_files $uri $uri/ /index.php?$args;
        # }

        location / {
        #开启这个走的是 php-fpm
        #try_files $uri $uri/ /index.php?$args;
        #开启这个走的是 swoole
        try_files $uri @laravels;
        }
        location /administrators {
            root /data/public;
        }
        access_log  /usr/local/openresty/nginx/logs/wm.log;
        error_log  /usr/local/openresty/nginx/logs/wm.error.log;
    }
}
